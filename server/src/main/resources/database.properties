# Configuration base de données - ChriOnline
# Base utilisée : PostgreSQL (même config que dans DBeaver)

# PostgreSQL
# Remplace LOCALHOST par ton serveur si la BDD n'est pas sur ta machine
db.url=jdbc:postgresql://localhost:5432/chrionline
# Utilisateur PostgreSQL (souvent "postgres")
db.user=postgres
# Mot de passe de l'utilisateur (celui que tu utilises dans DBeaver pour te connecter)
db.password=

# Driver PostgreSQL (à ajouter dans pom.xml : postgresql)
# <dependency>
#   <groupId>org.postgresql</groupId>
#   <artifactId>postgresql</artifactId>
#   <version>42.7.1</version>
# </dependency>

